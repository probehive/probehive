# Development-only PostgreSQL for the ProbeHive control plane.
#
#   docker compose -f deploy/compose/compose.dev.yaml up -d
#   podman compose -f deploy/compose/compose.dev.yaml up -d
#
# The credentials below are sanitized local development values, never production
# secrets. Release Compose assets are separate and will pin image digests.
name: probehive-dev

services:
  postgres:
    image: postgres:17.10
    environment:
      POSTGRES_DB: probehive
      POSTGRES_USER: probehive
      POSTGRES_PASSWORD: probehive
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - probehive-dev-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U probehive -d probehive"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  probehive-dev-postgres:
